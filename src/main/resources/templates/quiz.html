<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .quiz-box{
            background:white;
            padding:30px;
            width:500px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:left;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        .question{
            font-size:18px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .option{
            background:#f4f4f4;
            padding:10px;
            margin:8px 0;
            border-radius:8px;
            cursor:pointer;
        }

        .option:hover{
            background:#e0e0e0;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#007bff;
        }
    </style>
</head>

<body>

<div class="quiz-box">

    <h2>📝 Quiz</h2>

    <form action="/student/submit-quiz" method="post">

        <input type="hidden" name="quizId" th:value="${quiz.id}">

        <div class="question" th:text="${quiz.question}"></div>

        <label class="option">
            <input type="radio" name="answer" th:value="${quiz.option1}" required>
            <span th:text="${quiz.option1}"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" th:value="${quiz.option2}">
            <span th:text="${quiz.option2}"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" th:value="${quiz.option3}">
            <span th:text="${quiz.option3}"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" th:value="${quiz.option4}">
            <span th:text="${quiz.option4}"></span>
        </label>

        <button type="submit">Submit Answer</button>
    </form>

    <a class="back" href="/student/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
