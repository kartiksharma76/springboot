<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Result</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#00c6ff,#0072ff);
            height:100vh;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .result-box{
            background:white;
            padding:40px;
            width:400px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:10px;
            color:#333;
        }

        .score{
            font-size:60px;
            color:#28a745;
            font-weight:bold;
            margin:20px 0;
        }

        .msg{
            font-size:18px;
            color:#555;
            margin-bottom:20px;
        }

        .btn{
            display:block;
            text-decoration:none;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            color:white;
            font-weight:bold;
        }

        .dashboard{
            background:#007bff;
        }

        .results{
            background:#28a745;
        }

        .btn:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

<div class="result-box">

    <h2>🎉 Quiz Completed</h2>

    <div class="msg">Your Score</div>

    <div class="score" th:text="${score}"></div>

    <a class="btn dashboard" href="/student/dashboard">⬅ Back to Dashboard</a>
    <a class="btn results" href="/student/results">📊 View All Results</a>

</div>

</body>
</html>
