<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Results</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background: linear-gradient(135deg,#43cea2,#185a9d);
            padding:40px;
            text-align:center;
        }

        h2{
            color:white;
            margin-bottom:25px;
        }

        .container{
            background:white;
            padding:25px;
            border-radius:12px;
            width:80%;
            margin:auto;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
        }

        th,td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        th{
            background:#007bff;
            color:white;
        }

        tr:hover{
            background:#f2f2f2;
        }

        .score{
            font-weight:bold;
            color:green;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#dc3545;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            background:#c82333;
        }
    </style>
</head>

<body>

<h2>📊 My Quiz Results</h2>

<div class="container">

<table>
    <tr>
        <th>Question</th>
        <th>Your Answer</th>
        <th>Score</th>
    </tr>

    <tr th:each="r : ${results}">
        <td th:text="${r.quiz.question}"></td>
        <td th:text="${r.selectedAnswer}"></td>
        <td class="score" th:text="${r.score}"></td>
    </tr>
</table>

<a class="btn" href="/student/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
