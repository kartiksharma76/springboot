<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .dashboard{
            background:white;
            padding:40px;
            width:420px;
            border-radius:15px;
            box-shadow:0 15px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        .btn{
            display:block;
            margin:15px 0;
            padding:14px;
            border-radius:8px;
            text-decoration:none;
            font-size:16px;
            font-weight:bold;
            color:white;
            transition:0.3s;
        }

        .lesson{ background:#007bff; }
        .result{ background:#28a745; }
        .logout{ background:#dc3545; }

        .btn:hover{
            transform:scale(1.05);
            opacity:0.9;
        }

        .footer{
            margin-top:20px;
            font-size:12px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="dashboard">

    <h2>🎓 Student Dashboard</h2>

    <a class="btn lesson" href="/student/lessons">📚 View Lessons</a>
    <a class="btn result" href="/student/results">📊 My Results</a>
    <a class="btn logout" href="/">🚪 Logout</a>

    <div class="footer">
        Digital Learning System © 2026
    </div>

</div>

</body>
</html>
